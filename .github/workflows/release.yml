name: Release

# Push a version tag to cut a release:
#   git tag v1.1.0 && git push origin v1.1.0
# This builds the app on a Windows runner, compiles the Inno Setup installer, and
# uploads ImgViewer-<version>-Setup.exe to a GitHub Release. The app's auto-updater
# then picks it up automatically for all users.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained folder)
        shell: pwsh
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/win-x64

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.ver.outputs.version }}
          installer\ImgViewer.iss

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "dist/ImgViewer-${{ steps.ver.outputs.version }}-Setup.exe"
          --title "${{ github.ref_name }}"
          --notes "ImgViewer ${{ github.ref_name }}"
